<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" fill="none">
  <!-- Decorative top line -->
  <line x1="60" y1="28" x2="460" y2="28" stroke="#B8955A" stroke-width="0.75" opacity="0.6"/>

  <!-- C L S monogram — centered, spaced -->
