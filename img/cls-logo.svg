    font-weight="300"
    fill="#B8955A"
    text-anchor="middle"
    letter-spacing="22"
    dominant-baseline="middle"
  >C L S</text>

  <!-- Thin divider -->
  <line x1="120" y1="88" x2="400" y2="88" stroke="#B8955A" stroke-width="0.5" opacity="0.4"/>

  <!-- Continental -->
